name: 007_candidate_evidence
description: "Candidate-level model with extra evidence features: factor priors, assigned context, and same-factor positive retrieval scores."
data:
  train: data/train2.csv
  test: data/test2.csv
split:
  train_size: 0.7
  random_state: 42
metric:
  alpha: 0.5
features:
  repeat_assigned: 1
  include_month: true
  candidate_repeats: 8
  candidate_pair_repeats: 2
word_vectorizer:
  min_df: 2
  max_df: 0.96
  ngram_range: [1, 2]
  sublinear_tf: true
  max_features: 160000
char_vectorizer:
  analyzer: char_wb
  min_df: 3
  max_df: 0.98
  ngram_range: [3, 5]
  sublinear_tf: true
  max_features: 80000
evidence_vectorizer:
  min_df: 2
  max_df: 0.97
  ngram_range: [1, 2]
  sublinear_tf: true
  max_features: 120000
retrieval:
  top_k_same_factor: 30
model:
  max_iter: 1000
  solver: liblinear
  random_state: 42
  class_weight:
    0: 1.0
    1: 14.0
prediction:
  factor_threshold_grid: [0.0001, 0.08, 0.001]
  target_positive_rate: 0.085
  positive_rate_soft_min: 0.055
  positive_rate_soft_max: 0.13
  positive_rate_penalty: 1.1
  jaccard_weight_bonus: 0.06
