<div class="card {% if result.label == 'healthy' %}card-green{% else %}card-red{% endif %}">
  <div class="section-title">Результат оценки</div>
  <div class="badges-line">
    <span class="badge {% if result.label == 'healthy' %}badge-green{% else %}badge-red{% endif %}">{{ result.label }}</span>
    <span class="badge badge-gray">{{ result.confidence }}</span>
    <span class="badge badge-gray">{{ result.analyzer_id }} v{{ result.analyzer_version }}</span>
  </div>
  {% if result.details %}
  <p class="details">{{ result.details }}</p>
  {% endif %}
</div>
